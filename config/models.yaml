# =============================================================================
# Base-model catalog — the dropdown of fine-tunable open-source LLMs.
#
# Each entry:
#   key             unique slug used internally / in the UI
#   name            human-friendly display name
#   family          chat-template / architecture family
#   hf_id           official Hugging Face repo (full precision)
#   unsloth_id      Unsloth-maintained full-precision mirror (optional)
#   unsloth_4bit_id Unsloth pre-quantized bnb-4bit repo (fast QLoRA download)
#   params_b        parameter count in billions (drives VRAM estimates)
#   context_length  max context window of the base model
#   chat_template   template key passed to unsloth.chat_templates.get_chat_template
#   gated           true if the HF repo requires accepting a license (needs HF_TOKEN)
#   license         short license label (review upstream before redistributing)
#   tags            UI filters: recommended | small | general | code | multilingual | reasoning | tiny
#   description     one-liner shown in the UI
#
# NOTE: If an `unsloth_4bit_id` 404s at download time, the downloader falls back
# to `hf_id` with on-the-fly 4-bit quantization (download.allow_official_fallback).
# =============================================================================

